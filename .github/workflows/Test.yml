name: GoodLock Modules Dumper

on:
  workflow_dispatch:
  schedule:
    - cron: "5 */4 * * *"
  push:
    branches: [ main ]

jobs:
  update:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - device: "SM-G965F"
            sdk: "28"
            os: "9"
            csc: "DBT"
            oneui: "0"
          - device: "SM-N985F"
            sdk: "29"
            os: "10"
            csc: "DBT"
            oneui: "0"
          - device: "SM-N985F"
            sdk: "30"
            os: "11"
            csc: "DBT"
            oneui: "0"
          - device: "SM-G998B"
            sdk: "31"
            os: "12"
            csc: "DBT"
            oneui: "40100"
          - device: "SM-F936B"
            sdk: "32"
            os: "12L"
            csc: "EUX"
            oneui: "40101"
          - device: "SM-F946B"
            sdk: "33"
            os: "13"
            csc: "EUX"
            oneui: "50101"
          - device: "SM-S918B"
            sdk: "34"
            os: "14"
            csc: "EUX"
            oneui: "60000"

    steps:
      - name: Calculate systemId
        id: calculate_system_id
        run: echo "systemId=$(($(date +%s) - 180))" >> $GITHUB_ENV

      - name: Check for update
        id: check
        run: |
          need_update=0
          curl --retry 5 --retry-delay 5 "http://vas.samsungapps.com/product/getContentCategoryProductList.as?contentCategoryID=0000005309&deviceId=${{ matrix.device }}&sdkVer=${{ matrix.sdk }}&mcc=262&mnc=01&csc=${{ matrix.csc }}&imgWidth=512&imgHeight=512&startNum=1&endNum=100&alignOrder=recent&callerId=com.samsung.android.goodlock&cc=NONE&systemId=${{ env.systemId }}&abiType=64&oneUiVersion=${{ matrix.oneui }}" > tmp-${{ matrix.sdk }}.xml
          curl --retry 5 --retry-delay 5 "https://raw.githubusercontent.com/corsicanu/goodlock_dump/main/xml/${{ matrix.sdk }}.xml" > current-${{ matrix.sdk }}.xml
          if [ ! -f current-${{ matrix.sdk }}.xml ]; then echo "" > current-${{ matrix.sdk }}.xml; fi
          if [ "$(diff tmp-${{ matrix.sdk }}.xml current-${{ matrix.sdk }}.xml)" != "" ]; then need_update=1; fi
          echo "need_update=$need_update" >> $GITHUB_ENV

      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Update current version
        if: env.need_update == 1
        run: |
          rm -rf tmp* current*
          date=$(date +'%d-%m-%Y %H:%M:%S')
          echo "date=$date" >> $GITHUB_ENV
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git pull origin ${{github.ref}} --ff-only
          sudo apt install -y python3 python3-dev
          python3 -m pip install -r requirements.txt
          python3 dumper.py -d ${{ matrix.device }} -s ${{ matrix.sdk }} -o ${{ matrix.os }} -c ${{ matrix.csc }} -v ${{ matrix.oneui }}
          echo "files=`echo -n $(find releases/${{ matrix.sdk }} -name '*.apk') | sed 's/\n/ /g'`" >> $GITHUB_ENV
          git add *.xml
          git commit -m "${{ matrix.os }}: update of $date [ci skip]"

      - name: Push changes to repo
        if: env.need_update == 1
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.TOKEN }}
          branch: ${{ github.ref }}

  release:
    needs: update
    runs-on: ubuntu-latest
    if: ${{ needs.update.outputs.need_update == '1' }}
    steps:
      - name: Upload release assets
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ needs.update.outputs.upload_url }}
          asset_path: releases/${{ matrix.sdk }}/*.apk
          asset_name: ${{ env.files }}
          asset_content_type: application/zip
          github_token: ${{ secrets.TOKEN }}
